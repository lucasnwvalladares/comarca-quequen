<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Esquema del desnivel topográfico del tramo Cifuentes-Aldaya</title>
  <desc id="desc">Diagrama interpretativo del tramo de unos 800 metros entre dos puntos del Río Quequén Salado, con un desnivel topográfico indicado de 14,74 metros según documentación técnica aportada por referentes locales.</desc>
  <defs>
    <linearGradient id="land" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f5f4"/>
      <stop offset="0.58" stop-color="#e7e5e4"/>
      <stop offset="1" stop-color="#d6d3d1"/>
    </linearGradient>
    <linearGradient id="river" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#164e63"/>
      <stop offset="0.45" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0c4a6e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1c1917" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#fafaf9"/>

  <rect x="70" y="55" width="1460" height="610" rx="18" fill="url(#land)" stroke="#d6d3d1"/>

  <text x="760" y="150" fill="#ffffff" stroke="#57534e" stroke-width="4" paint-order="stroke" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="800" font-style="italic">Aldaya</text>

  <path d="M120 250 C275 185 370 190 490 230 C630 276 760 270 905 222 C1030 180 1155 185 1265 254 C1395 334 1425 458 1510 525 L1510 610 C1390 570 1325 510 1235 460 C1125 385 1005 372 875 410 C730 452 595 456 455 412 C330 374 230 374 120 430 Z" fill="url(#river)" opacity="0.94"/>
  <path d="M160 272 C305 222 402 232 515 262 C642 297 765 295 902 255 C1034 216 1145 222 1248 285 C1365 356 1408 462 1490 540" fill="none" stroke="#e0f2fe" stroke-width="10" opacity="0.9"/>
  <path d="M165 306 C320 266 413 274 522 302 C650 336 776 338 915 296 C1030 261 1125 271 1225 330 C1340 398 1382 488 1475 582" fill="none" stroke="#fef3c7" stroke-width="7" stroke-dasharray="16 22" opacity="0.85"/>

  <path d="M182 138 L226 270 L318 260" fill="none" stroke="#facc15" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M182 172 L220 287 L330 279" fill="none" stroke="#facc15" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <path d="M182 206 L214 304 L343 299" fill="none" stroke="#facc15" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <text x="165" y="115" fill="#57534e" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">Estacionamiento</text>

  <circle cx="295" cy="255" r="42" fill="#ffffff" stroke="#dc2626" stroke-width="5"/>
  <text x="281" y="272" fill="#0284c7" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">1</text>
  <circle cx="1368" cy="565" r="42" fill="#ffffff" stroke="#dc2626" stroke-width="5"/>
  <text x="1354" y="582" fill="#0284c7" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="800">2</text>

  <path d="M382 305 C390 283 397 266 416 252" fill="none" stroke="#0ea5e9" stroke-width="9" stroke-linecap="round"/>
  <path d="M410 315 C419 290 430 272 452 259" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <text x="370" y="385" fill="#dc2626" stroke="#ffffff" stroke-width="5" paint-order="stroke" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900">A</text>

  <path d="M1052 300 C1059 272 1076 250 1102 232" fill="none" stroke="#0ea5e9" stroke-width="9" stroke-linecap="round"/>
  <path d="M1086 338 C1096 302 1116 275 1146 256" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  <text x="1080" y="405" fill="#dc2626" stroke="#ffffff" stroke-width="5" paint-order="stroke" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="900">B</text>

  <text x="640" y="305" fill="#ffffff" stroke="#0f172a" stroke-width="3" paint-order="stroke" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Río Quequén Salado</text>
  <text x="860" y="535" fill="#ffffff" stroke="#57534e" stroke-width="4" paint-order="stroke" font-family="Playfair Display, Georgia, serif" font-size="76" font-weight="800" font-style="italic">Cifuentes</text>

  <line x1="315" y1="615" x2="1375" y2="615" stroke="#166534" stroke-width="8" stroke-linecap="round"/>
  <path d="M315 615 L360 590 M315 615 L360 640 M1375 615 L1330 590 M1375 615 L1330 640" fill="none" stroke="#166534" stroke-width="8" stroke-linecap="round"/>
  <text x="610" y="585" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="900">tramo aproximado: 800 m</text>

  <g>
    <circle cx="1020" cy="625" r="22" fill="#facc15"/>
    <text x="1012" y="640" fill="#1c1917" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="900">*</text>
    <text x="1065" y="634" fill="#44403c" font-family="Inter, Arial, sans-serif" font-size="22">bajada</text>
    <path d="M1190 621 L1250 633 L1310 614" fill="none" stroke="#facc15" stroke-width="8" stroke-linecap="round"/>
    <text x="1335" y="634" fill="#44403c" font-family="Inter, Arial, sans-serif" font-size="22">estacionamiento</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="95" y="690" width="730" height="170" rx="18" fill="#ffffff" opacity="0.98"/>
    <text x="135" y="738" fill="#1c1917" font-family="Playfair Display, Georgia, serif" font-size="40" font-weight="800" font-style="italic">Lectura técnica</text>
    <text x="135" y="780" fill="#44403c" font-family="Inter, Arial, sans-serif" font-size="25">Entre los puntos 1 y 2, referentes locales citan</text>
    <text x="135" y="812" fill="#44403c" font-family="Inter, Arial, sans-serif" font-size="25">un relevamiento de Hidromecánica UNLP (1992).</text>
    <text x="135" y="848" fill="#166534" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="900">Desnivel del tramo: 14,74 m en aprox. 800 m.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="860" y="690" width="650" height="170" rx="18" fill="#1c1917" opacity="0.9"/>
    <text x="900" y="738" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">Importante</text>
    <text x="900" y="780" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25">Ese dato no equivale a la altura individual</text>
    <text x="900" y="812" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25">de una cascada ni prueba, por sí solo,</text>
    <text x="900" y="844" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25">un récord provincial.</text>
  </g>
</svg>
